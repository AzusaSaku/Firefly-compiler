name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux Release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install LLVM dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm llvm-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$(llvm-config --cmakedir)"

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: bash ./tests/smoke_llvm.sh ./build/firefly
