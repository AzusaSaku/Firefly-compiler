name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LLVM
        shell: pwsh
        run: choco install llvm --version=18.1.8 -y

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DLLVM_DIR="C:\Program Files\LLVM\lib\cmake\llvm"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\smoke_llvm.ps1 -Exe .\build\Release\firefly.exe

  linux:
    name: Linux Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LLVM dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm llvm-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$(llvm-config --cmakedir)"

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: bash ./tests/smoke_llvm.sh ./build/firefly
