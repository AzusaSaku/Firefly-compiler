name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows-release

      - name: Configure
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_ROOT
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          }
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $vcpkgRoot = "C:\vcpkg"
          }
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\smoke_llvm.ps1 -Exe .\build\Release\firefly.exe

  linux:
    name: Linux Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LLVM dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm llvm-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$(llvm-config --cmakedir)"

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: bash ./tests/smoke_llvm.sh ./build/firefly
